[theme]
primaryColor = "#FF0000"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "auto"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
headless = true

[logger]
level = "info"
